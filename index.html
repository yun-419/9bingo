<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BINGO 2026</title>
  <style>
    body { margin: 0; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
           background: linear-gradient(135deg, #fdeadb 0%, #fff4ea 100%);
           min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #1a1a1a; }
    .loading { text-align: center; }
    .dot { display: inline-block; width: 10px; height: 10px; background: #e87a2e; border-radius: 50%;
           margin: 0 3px; animation: bounce 1.4s infinite ease-in-out both; }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="loading">
    <div style="font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; color: #e87a2e;">BINGO 2026</div>
    <div style="margin-top: 14px;"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
  <script>
    // 把 URL 的 ?room=xxx 轉給 bingo.html（重要：讓分享連結正常運作）
    // 如果沒有 ?room 但 localStorage 有存過，也自動帶上（避免使用者開純網址就進到新房間）
    (function() {
      var target = './bingo.html';
      var currentQuery = location.search || '';
      var hasRoomInURL = /[?&]room=/.test(currentQuery);
      if (hasRoomInURL) {
        target += currentQuery;
      } else {
        try {
          var saved = localStorage.getItem('bingo_room_v1');
          if (saved) target += '?room=' + encodeURIComponent(saved);
        } catch (e) {}
      }
      location.replace(target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=./bingo.html">
    <p>Redirecting to <a href="./bingo.html">bingo.html</a>...</p>
  </noscript>
</body>
</html>
